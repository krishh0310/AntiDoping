{% extends "base.html" %}
{% block content %}

<div class="chatgpt-page">
    <div class="chatgpt-header">
        <h1>AI Anti-Doping Assistant</h1>
        <p>Ask about banned substances, testing, TUE, athlete safety, and clean sport.</p>
    </div>

    <div id="chat-box" class="chatgpt-box">
        <div class="msg-row bot-row">
            <div class="avatar bot-avatar">🤖</div>
            <div class="msg-content">
                <div class="msg-bubble bot-bubble">
                    Hi! I’m your Anti-Doping Assistant. Ask me anything.
                </div>
                <div class="msg-actions">
                    <button class="copy-btn" onclick="copyText(this)" data-copy="Hi! I’m your Anti-Doping Assistant. Ask me anything.">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <div class="chatgpt-inputbar">
        <input
            id="user-input"
            type="text"
            placeholder="Message Anti-Doping Assistant..."
            autocomplete="off"
        >
        <button onclick="sendMessage()">Send</button>
    </div>

    <div class="chatgpt-tip">Press Enter to send</div>
</div>

<style>
.chatgpt-page{
    max-width: 950px;
    margin: 0 auto;
    padding: 24px 16px 10px;
}

.chatgpt-header{
    text-align: center;
    margin-bottom: 18px;
}

.chatgpt-header h1{
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: #1f2937;
}

.chatgpt-header p{
    color: #6b7280;
    margin: 0;
    font-size: 1rem;
}

.chatgpt-box{
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 18px;
    height: 560px;
    overflow-y: auto;
    padding: 22px 18px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    scroll-behavior: smooth;
}

.msg-row{
    display: flex;
    margin-bottom: 18px;
    align-items: flex-start;
}

.user-row{
    justify-content: flex-end;
}

.bot-row{
    justify-content: flex-start;
}

.avatar{
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
}

.bot-avatar{
    background: #111827;
    color: white;
    margin-right: 10px;
}

.user-avatar{
    background: #2563eb;
    color: white;
    margin-left: 10px;
    order: 2;
}

.msg-content{
    max-width: 76%;
}

.user-row .msg-content{
    display: flex;
    flex-direction: column;
    align-items: flex-end;
}

.msg-bubble{
    padding: 14px 16px;
    border-radius: 18px;
    line-height: 1.6;
    font-size: 15px;
    word-wrap: break-word;
    white-space: pre-wrap;
}

.bot-bubble{
    background: #f3f4f6;
    color: #111827;
    border-top-left-radius: 6px;
}

.user-bubble{
    background: #111827;
    color: #ffffff;
    border-top-right-radius: 6px;
}

.msg-actions{
    margin-top: 6px;
}

.copy-btn{
    border: none;
    background: transparent;
    color: #6b7280;
    font-size: 12px;
    cursor: pointer;
    padding: 0;
}

.copy-btn:hover{
    color: #111827;
    text-decoration: underline;
}

.chatgpt-inputbar{
    display: flex;
    gap: 10px;
    margin-top: 16px;
    position: sticky;
    bottom: 0;
}

.chatgpt-inputbar input{
    flex: 1;
    padding: 14px 16px;
    border-radius: 14px;
    border: 1px solid #d1d5db;
    font-size: 15px;
    outline: none;
    background: #ffffff;
}

.chatgpt-inputbar input:focus{
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
}

.chatgpt-inputbar button{
    border: none;
    background: #111827;
    color: white;
    border-radius: 14px;
    padding: 0 22px;
    font-weight: 600;
    cursor: pointer;
}

.chatgpt-inputbar button:hover{
    background: #000000;
}

.chatgpt-tip{
    margin-top: 8px;
    color: #6b7280;
    font-size: 13px;
}

.typing{
    display: inline-flex;
    gap: 6px;
    align-items: center;
    min-height: 20px;
}

.typing span{
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #6b7280;
    animation: bounce 1.2s infinite ease-in-out;
}

.typing span:nth-child(2){
    animation-delay: 0.15s;
}

.typing span:nth-child(3){
    animation-delay: 0.3s;
}

@keyframes bounce{
    0%, 80%, 100%{
        transform: scale(0.7);
        opacity: 0.5;
    }
    40%{
        transform: scale(1);
        opacity: 1;
    }
}

@media (max-width: 768px){
    .chatgpt-box{
        height: 500px;
        padding: 16px 12px;
    }

    .msg-content{
        max-width: 88%;
    }

    .chatgpt-header h1{
        font-size: 1.7rem;
    }
}
</style>

<script>
const chatBox = document.getElementById("chat-box");
const input = document.getElementById("user-input");

function escapeHtml(text) {
    const div = document.createElement("div");
    div.innerText = text;
    return div.innerHTML;
}

function formatBotText(text) {
    let safe = escapeHtml(text);

    safe = safe.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    safe = safe.replace(/\*(.*?)\*/g, "<em>$1</em>");
    safe = safe.replace(/\n/g, "<br>");

    return safe;
}

function addUserMessage(text){
    const html = `
        <div class="msg-row user-row">
            <div class="msg-content">
                <div class="msg-bubble user-bubble">${escapeHtml(text)}</div>
            </div>
            <div class="avatar user-avatar">🧑</div>
        </div>
    `;
    chatBox.insertAdjacentHTML("beforeend", html);
    scrollToBottom();
}

function addBotMessage(text){
    const cleanText = typeof text === "string" ? text : "";
    const html = `
        <div class="msg-row bot-row">
            <div class="avatar bot-avatar">🤖</div>
            <div class="msg-content">
                <div class="msg-bubble bot-bubble">${formatBotText(cleanText)}</div>
                <div class="msg-actions">
                    <button class="copy-btn" onclick="copyText(this)" data-copy="${escapeHtml(cleanText)}">Copy</button>
                </div>
            </div>
        </div>
    `;
    chatBox.insertAdjacentHTML("beforeend", html);
    scrollToBottom();
}

function showTyping(){
    const html = `
        <div class="msg-row bot-row" id="typing-row">
            <div class="avatar bot-avatar">🤖</div>
            <div class="msg-content">
                <div class="msg-bubble bot-bubble">
                    <div class="typing">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        </div>
    `;
    chatBox.insertAdjacentHTML("beforeend", html);
    scrollToBottom();
}

function removeTyping(){
    const row = document.getElementById("typing-row");
    if(row) row.remove();
}

function scrollToBottom(){
    chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage(){
    const message = input.value.trim();
    if(!message) return;

    addUserMessage(message);
    input.value = "";
    showTyping();

    try{
        const res = await fetch("/api/chat/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: message })
        });

        const data = await res.json();
        removeTyping();

        if(data.reply){
            addBotMessage(data.reply);
        } else if(data.error){
            addBotMessage("⚠️ " + data.error);
        } else {
            addBotMessage("⚠️ Server error. Please try again.");
        }
    } catch(err){
        removeTyping();
        addBotMessage("⚠️ Unable to connect to server.");
    }
}

async function copyText(button){
    const text = button.getAttribute("data-copy");
    try{
        await navigator.clipboard.writeText(text);
        const old = button.innerText;
        button.innerText = "Copied";
        setTimeout(() => {
            button.innerText = old;
        }, 1200);
    } catch(e){
        button.innerText = "Copy failed";
        setTimeout(() => {
            button.innerText = "Copy";
        }, 1200);
    }
}

input.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});
</script>

{% endblock %}
